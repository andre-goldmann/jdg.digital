<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <h1>Welcome to OELAPA</h1>
      </mat-card-title>
      <mat-card-subtitle>
        Property Management System
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="login-content">
        <p class="login-description">
          Click the button below to sign in with your Keycloak account.
        </p>
        
        <button
          mat-raised-button
          color="primary"
          (click)="onLogin()"
          class="full-width login-button"
          aria-label="Login with Keycloak"
        >
          <mat-icon>login</mat-icon>
          <span>Login with Keycloak</span>
        </button>
      </div>
    </mat-card-content>

    <mat-card-footer>
      <p class="footer-text">
        Secure authentication powered by Keycloak
      </p>
    </mat-card-footer>
  </mat-card>
</div>
