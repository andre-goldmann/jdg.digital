@if (navigationConfig$ | async; as navConfig) {
  <div class="app-container">
    <mat-sidenav-container class="sidenav-container">
      <!-- Sidenav -->
      <mat-sidenav 
        #sidenav
        [mode]="navConfig.mode"
        [opened]="isExpanded$ | async"
        class="app-sidenav">
        <app-navigation-sidemenu></app-navigation-sidemenu>
      </mat-sidenav>

      <!-- Main Content -->
      <mat-sidenav-content class="main-content">
        <!-- Toolbar -->
        <mat-toolbar color="primary" class="app-toolbar">
          <button 
            mat-icon-button 
            (click)="toggleSidenav()"
            aria-label="Toggle navigation menu"
            class="menu-toggle">
            <mat-icon>menu</mat-icon>
          </button>
          
          <span class="toolbar-title">OELAPA Property Management</span>
          
          <span class="toolbar-spacer"></span>
          
          <app-auth-status></app-auth-status>
        </mat-toolbar>

        <!-- Page Content -->
        <div class="page-content">
          <router-outlet></router-outlet>
        </div>
      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
}
